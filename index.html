<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">👷</span>
        <span class="logo-text">Employee Tracker</span>
      </div>
      <nav>
        <button class="nav-btn active" data-tab="search">🔍 Search</button>
        <button class="nav-btn" data-tab="add">➕ Add Record</button>
        <button class="nav-btn" data-tab="records">📋 All Records</button>
        <button class="nav-btn" data-tab="summary">📊 Summary</button>
      </nav>
    </div>
  </header>

  <main>
    <!-- SEARCH TAB -->
    <section id="tab-search" class="tab active">
      <div class="search-hero">
        <h1>Find Records</h1>
        <p>Search by date, day name, or notes</p>
        <div class="search-bar-wrap">
          <input id="searchInput" type="text" class="search-input" placeholder="e.g. Monday, 2026-03-24, roofing…" autocomplete="off" />
          <button id="searchBtn" class="btn-primary">Search</button>
        </div>
      </div>
      <div id="searchResults" class="table-wrap hidden"></div>
    </section>

    <!-- ADD RECORD TAB -->
    <section id="tab-add" class="tab">
      <div class="card">
        <h2>Add Daily Record</h2>
        <div id="addMsg" class="msg hidden"></div>
        <div class="form-grid">
          <div class="form-group">
            <label>Date *</label>
            <input type="date" id="f-date" required />
          </div>
          <div class="form-group">
            <label>Day</label>
            <input type="text" id="f-day" placeholder="Auto-filled" readonly />
          </div>
          <div class="form-group">
            <label>Main Workers — Shift 1 <span class="shift-time">(09:00 – 17:30)</span></label>
            <input type="number" id="f-mw1" min="0" value="0" />
          </div>
          <div class="form-group">
            <label>Main Workers — Shift 2 <span class="shift-time">(06:00 – 17:30)</span></label>
            <input type="number" id="f-mw2" min="0" value="0" />
          </div>
          <div class="form-group">
            <label>Helpers — Shift 1 <span class="shift-time">(09:00 – 17:30)</span></label>
            <input type="number" id="f-h1" min="0" value="0" />
          </div>
          <div class="form-group">
            <label>Helpers — Shift 2 <span class="shift-time">(06:00 – 17:00)</span></label>
            <input type="number" id="f-h2" min="0" value="0" />
          </div>
          <div class="form-group">
            <label>Water Man</label>
            <input type="number" id="f-wm" min="0" value="0" />
          </div>
          <div class="form-group">
            <label>Total (auto)</label>
            <input type="text" id="f-total" readonly class="readonly-field" />
          </div>
          <div class="form-group full-width">
            <label>Notes</label>
            <textarea id="f-notes" rows="3" placeholder="Optional notes…"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button id="addRecordBtn" class="btn-primary">Save Record</button>
          <button id="clearFormBtn" class="btn-secondary">Clear</button>
        </div>
      </div>
    </section>

    <!-- ALL RECORDS TAB -->
    <section id="tab-records" class="tab">
      <div class="toolbar">
        <h2>All Records</h2>
        <div class="toolbar-actions">
          <button id="exportCsvBtn" class="btn-secondary">⬇ Export CSV</button>
        </div>
      </div>
      <div class="table-wrap" id="recordsTable">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>
      <div id="pagination" class="pagination"></div>
    </section>

    <!-- SUMMARY TAB -->
    <section id="tab-summary" class="tab">
      <h2>Summary</h2>
      <div id="summaryCards" class="summary-grid">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>
    </section>
  </main>

  <!-- EDIT MODAL -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>Edit Record</h3>
      <div id="editMsg" class="msg hidden"></div>
      <input type="hidden" id="e-id" />
      <div class="form-grid">
        <div class="form-group">
          <label>Date *</label>
          <input type="date" id="e-date" required />
        </div>
        <div class="form-group">
          <label>Day</label>
          <input type="text" id="e-day" readonly />
        </div>
        <div class="form-group">
          <label>Main Workers Shift 1</label>
          <input type="number" id="e-mw1" min="0" />
        </div>
        <div class="form-group">
          <label>Main Workers Shift 2</label>
          <input type="number" id="e-mw2" min="0" />
        </div>
        <div class="form-group">
          <label>Helpers Shift 1</label>
          <input type="number" id="e-h1" min="0" />
        </div>
        <div class="form-group">
          <label>Helpers Shift 2</label>
          <input type="number" id="e-h2" min="0" />
        </div>
        <div class="form-group">
          <label>Water Man</label>
          <input type="number" id="e-wm" min="0" />
        </div>
        <div class="form-group">
          <label>Total (auto)</label>
          <input type="text" id="e-total" readonly class="readonly-field" />
        </div>
        <div class="form-group full-width">
          <label>Notes</label>
          <textarea id="e-notes" rows="3"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button id="saveEditBtn" class="btn-primary">Save Changes</button>
        <button id="cancelEditBtn" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
